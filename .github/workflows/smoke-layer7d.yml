# Compila layer7d (Linux) e corre scripts/package/smoke-layer7d.sh.
# Não substitui validação do port `.pkg` no FreeBSD / pfSense (validacao-lab.md).
name: smoke layer7d

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: pkg-plist vs files/
        run: sh scripts/package/check-port-files.sh
      - name: Toolchain + smoke
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential bmake
          sh scripts/package/smoke-layer7d.sh
      - name: Shell syntax
        run: |
          find scripts package/pfSense-pkg-layer7/files -type f \( -name '*.sh' -o -name 'pkg-*' -o -name 'layer7-pfctl' -o -path '*/rc.d/*' \) -print0 |
            xargs -0 -n1 sh -n
